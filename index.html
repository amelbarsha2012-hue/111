<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Data to Google Sheets</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; background: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0 16px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; padding: 14px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #45a049; }
        #response { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .success { background-color: #dff0d8; color: #3c763d; border: 1px solid #d6e9c6; display: block !important; }
        .error { background-color: #f2dede; color: #a94442; border: 1px solid #ebccd1; display: block !important; }
        h2 { color: #333; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 Contact Form</h2>
    <form id="dataForm">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="message">Your Message</label>
        <textarea id="message" rows="4" placeholder="Write your message here..." required></textarea>

        <button type="submit">Submit</button>
    </form>

    <div id="response"></div>
</div>

<script>
    // Get the form element
    const form = document.getElementById('dataForm');
    const responseDiv = document.getElementById('response');

    // THIS IS WHERE YOU PASTE YOUR WEB APP URL
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxdWOQLPvimATfHHIU7ruUlRY0uVyzX9pjkhZB536q6wCMOSJtlRUB1tk6LatfEWXu4/exec'; // <--- CHANGE THIS

    // Listen for the form submit event
    form.addEventListener('submit', async function(event) {
        event.preventDefault(); // Prevent the page from refreshing

        // 1. Collect data from the form inputs
        const formData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            message: document.getElementById('message').value
        };

        // 2. Show a "loading" message
        responseDiv.className = '';
        responseDiv.style.display = 'block';
        responseDiv.style.backgroundColor = '#fff3cd';
        responseDiv.style.color = '#856404';
        responseDiv.style.border = '1px solid #ffeeba';
        responseDiv.textContent = '⏳ Submitting...';

        try {
            // 3. Send the data to your Google Apps Script Web App
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // Important: This prevents CORS errors
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            });

            // Because we used 'no-cors', we can't read the response body.
            // We just assume it worked if no network error occurred.
            responseDiv.className = 'success';
            responseDiv.textContent = '✅ Data submitted successfully! Check your Google Sheet.';
            form.reset(); // Clear the form fields

        } catch (error) {
            // Show an error if the network request fails
            responseDiv.className = 'error';
            responseDiv.textContent = '❌ Error: Could not reach the server. Please check your internet connection.';
            console.error('Fetch error:', error);
        }
    });
</script>

</body>
</html>
